name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_BASE_PATH: /migdal-365-portal/
          VITE_AUTH_MODE: msal
          VITE_TENANT_ID: b7f844ce-999e-44bd-9455-ff2c2c0ec8ae
          VITE_CLIENT_ID: f40b7a20-50d4-4394-b784-c8356a3393d8
          VITE_REDIRECT_URI: https://shimonarzuan.github.io/migdal-365-portal/
          VITE_GRAPH_ENDPOINT: https://graph.microsoft.com/v1.0
          VITE_SHAREPOINT_SITE: migdalmuni.sharepoint.com:/sites/Migdal365Portal2
          VITE_ADMIN_UPNS: eran@migdal-haemeq.muni.il
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
